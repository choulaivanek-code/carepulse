name: PipeForge Demo — CarePulse

on:
  workflow_dispatch:

jobs:
  demo-pipeline:
    name: Build & Test Pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Analyse statique du backend
        run: echo "Analyse du backend Spring Boot..." && sleep 1 && echo "Aucune anomalie détectée"

      - name: Build du backend
        run: echo "Compilation Maven..." && sleep 2 && echo "BUILD SUCCESS"

      - name: Installation des dépendances frontend
        run: echo "npm install..." && sleep 1 && echo "up to date, 0 vulnerabilities"

      - name: Build du frontend
        run: echo "Build Vue.js (production)..." && sleep 2 && echo "Build terminé avec succès"

      - name: Exécution des tests
        run: echo "Lancement de la suite de tests..." && sleep 1 && echo "14 tests passés, 0 échec"

      - name: Résumé du pipeline
        run: echo "Pipeline CarePulse déclenché via PipeForge — build backend + frontend validé"
