extends: default

rules:
  # GitHub Actions utilise "on:" comme clé -> yamllint le lit sinon comme booléen
  truthy:
    allowed-values: ['true', 'false', 'on', 'off']
    check-keys: false

  # Les workflows GitHub Actions n'ont pas besoin du marqueur "---"
  document-start: disable

  # Les commentaires décoratifs (séparateurs ─────) peuvent dépasser 80 caractères
  line-length:
    max: 150
    allow-non-breakable-words: true

  comments-indentation: disable
