server:
  port: 8080

spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/carepulse?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password:
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
  main:
    allow-bean-definition-overriding: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: noreply@carepulse.com
    password: password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

carepulse:
  mail:
    enabled: false

logging:
  level:
    com.carepulse: INFO
    org.springframework.security: WARN
